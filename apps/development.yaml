apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: geo-trails-api-development
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: ./k8s
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  values:
    namespace: geo-trails-api-development
    replicaCount: 1
    image:
      tag: latest
    env:
      nodeEnv: development
    ingress:
      host: geo-trails-dev.api.ericafenyo.com
