apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: geo-trails-api-staging
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: ./k8s
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  values:
    namespace: geo-trails-api-staging
    replicaCount: 1
    image:
      tag: rc-1.0.0
    env:
      nodeEnv: staging
    ingress:
      host: geo-trails-staging.api.ericafenyo.com
