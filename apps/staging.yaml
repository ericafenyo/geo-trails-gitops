apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: geo-trails-api-staging
  namespace: flux-system
spec:
  interval: 10m

  targetNamespace: geo-trails-api-staging

  install:
    createNamespace: true

  chart:
    spec:
      chart: k8s
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  values:
    replicaCount: 1
    image:
      tag: rc-1.0.0
    env:
      nodeEnv: staging
    ingress:
      host: geo-trails-staging-api.ericafenyo.com
