apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gta-dev
  namespace: flux-system
spec:
  interval: 10m

  targetNamespace: gta-dev

  install:
    createNamespace: true

  chart:
    spec:
      chart: k8s
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system

  values:
    replicaCount: 1
    image:
      tag: latest
    env:
      nodeEnv: development
    ingress:
      host: dev-gta.ericafenyo.com
