apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gta-prod
  namespace: flux-system
spec:
  dependsOn:
    - name: flux-system
  interval: 10m
  targetNamespace: gta-prod

  install:
    createNamespace: true

  chart:
    spec:
      chart: k8s
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  values:
    replicaCount: 2
    image:
      tag: 1.0.0
    env:
      nodeEnv: production
    ingress:
      host: gta.ericafenyo.com
