apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: geo-trails-api-production
  namespace: flux-system
spec:
  interval: 10m
  targetNamespace: geo-trails-api-production

  install:
    createNamespace: true
    
  chart:
    spec:
      chart: k8s
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  values:
    replicaCount: 2
    image:
      tag: 1.0.0
    env:
      nodeEnv: production
    ingress:
      host: geo-trails-api.ericafenyo.com
